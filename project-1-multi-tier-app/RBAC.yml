apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-service-account
  namespace: iot-nsp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nginx-role
  namespace: iot-nsp
rules:
- apiGroups: [""]
  resources: ["pods", "configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-role-binding
  namespace: iot-nsp
subjects:
- kind: ServiceAccount
  name: nginx-service-account
  namespace: iot-nsp
roleRef:
  kind: Role
  name: nginx-role
  apiGroup: rbac.authorization.k8s.io
